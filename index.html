<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Reveal v3</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f0e0c; color:#faf7f2; font-family:'Georgia',serif; overflow-x:hidden; }

  #before {
    height:40vh; background:#1a1815;
    display:flex; align-items:center; justify-content:center;
  }
  #before p { color:rgba(255,255,255,0.2); font-style:italic; letter-spacing:0.1em; }

  /* ══ REVEAL WRAP — extra scroll height ══ */
  #reveal-wrap { position:relative; height:350vh; }

  #reveal-sticky {
    position:sticky; top:0; height:100vh; overflow:hidden;
  }

  /* ── Kitchen image — behind, full and uncropped ── */
  #kitchen-layer {
    position:absolute; inset:0; z-index:1;
    background:#0f0e0c;
    display:flex; align-items:center; justify-content:center;
  }
  #kitchen-layer img {
    width:100%;
    height:100%;
    object-fit:contain; /* full image, no crop */
    object-position:center;
  }

  /* ── Great Room — clips away revealing kitchen ── */
  #greatroom-layer {
    position:absolute; inset:0; z-index:2;
    clip-path:inset(0 0 0% 0);
    will-change:clip-path;
  }
  #greatroom-layer img {
    width:100%; height:100%; object-fit:cover;
  }
  #greatroom-layer::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(
      to bottom,
      rgba(15,14,12,0.05) 0%,
      rgba(15,14,12,0.0) 30%,
      rgba(15,14,12,0.4) 65%,
      rgba(15,14,12,0.9) 100%
    );
  }

  /* ── Great Room content — title stays, body text exits ── */
  #greatroom-header {
    position:absolute; bottom:0; left:0; right:0; z-index:3;
    padding:0 32px 52px;
  }
  .eyebrow {
    font-family:sans-serif; font-size:0.48rem; letter-spacing:0.28em;
    text-transform:uppercase; color:rgba(196,160,82,0.8);
    display:block; margin-bottom:10px;
  }
  .room-title {
    font-size:clamp(2rem,8vw,3.5rem);
    font-weight:300; line-height:1.05; margin-bottom:16px;
  }
  .room-title em { font-style:italic; color:rgba(255,255,255,0.45); }

  /* Body text — this is what scrolls up and reveals kitchen */
  #greatroom-body {
    position:absolute; bottom:0; left:0; right:0; z-index:3;
    padding:0 32px 52px;
    will-change:transform;
  }
  .room-body {
    font-family:sans-serif; font-size:0.75rem; font-weight:300;
    line-height:1.9; color:rgba(255,255,255,0.5);
  }

  /* ── Kitchen label — fades in when revealed ── */
  #kitchen-label {
    position:absolute; bottom:40px; left:32px; right:32px; z-index:4;
    opacity:0; transform:translateY(16px);
    transition:opacity 0.7s ease, transform 0.7s ease;
  }
  #kitchen-label.visible { opacity:1; transform:translateY(0); }

  #after {
    height:60vh; background:#0f0e0c;
    display:flex; align-items:center; justify-content:center;
  }
  #after p { color:rgba(255,255,255,0.2); font-style:italic; }
</style>
</head>
<body>

<section id="before"><p>Previous section</p></section>

<div id="reveal-wrap">
  <div id="reveal-sticky">

    <!-- Kitchen — full uncropped image behind -->
    <div id="kitchen-layer">
      <img src="https://raw.githubusercontent.com/hernanpagani-79/6ardingterrace/main/6-Harding_INTCAM06-1.jpg" alt="Kitchen">
    </div>

    <!-- Great Room — clips away from bottom up -->
    <div id="greatroom-layer">
      <img src="https://raw.githubusercontent.com/hernanpagani-79/6ardingterrace/main/6-Harding_INTCAM05-2.jpg" alt="Great Room">
    </div>

    <!-- Great Room title — stays put longer -->
    <div id="greatroom-header">
      <span class="eyebrow">— Living Room</span>
      <h2 class="room-title">Great<br><em>Room</em></h2>
    </div>

    <!-- Great Room body text — exits first, triggering the reveal -->
    <div id="greatroom-body">
      <p class="room-body">The room that earns the house. Vaulted white oak overhead, glass that folds entirely open to the garden, a fireplace that makes October worth having.</p>
    </div>

    <!-- Kitchen label — appears once revealed -->
    <div id="kitchen-label">
      <span class="eyebrow">— Kitchen</span>
      <h2 class="room-title">Chef's<br><em>Kitchen</em></h2>
    </div>

  </div>
</div>

<section id="after"><p>Next section</p></section>

<script>
const wrap         = document.getElementById('reveal-wrap');
const greatLayer   = document.getElementById('greatroom-layer');
const greatHeader  = document.getElementById('greatroom-header');
const greatBody    = document.getElementById('greatroom-body');
const kitchenLabel = document.getElementById('kitchen-label');
let ticking = false;

function tick(){
  const wh       = window.innerHeight;
  const rect     = wrap.getBoundingClientRect();
  const progress = Math.max(0, Math.min(1, -rect.top / (wrap.offsetHeight - wh)));

  // Phase 1 (0 → 0.5): body text rises out of screen
  // Phase 2 (0.5 → 1): great room image clips away, kitchen revealed

  // Body text exits from 0 to 0.5 progress
  const bodyProgress = Math.min(1, progress / 0.5);
  greatBody.style.transform = `translateY(-${bodyProgress * wh * 0.7}px)`;
  greatBody.style.opacity = 1 - bodyProgress;

  // Header exits slightly later (0.2 → 0.8)
  const headerProgress = Math.max(0, Math.min(1, (progress - 0.2) / 0.6));
  greatHeader.style.transform = `translateY(-${headerProgress * wh * 0.5}px)`;
  greatHeader.style.opacity = 1 - headerProgress;

  // Clip starts at 0.3, completes at 1.0
  const clipProgress = Math.max(0, Math.min(1, (progress - 0.3) / 0.7));
  greatLayer.style.clipPath = `inset(0 0 ${clipProgress * 100}% 0)`;

  // Kitchen label appears at 0.75
  kitchenLabel.classList.toggle('visible', progress > 0.75);

  ticking = false;
}

window.addEventListener('scroll', () => {
  if(!ticking){ requestAnimationFrame(tick); ticking = true; }
}, {passive:true});
tick();
</script>
</body>
</html>
