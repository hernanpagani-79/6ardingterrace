<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Reveal — Cortina</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0f0e0c; --gold:#c4a052; --white:#faf7f2; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--ink); color:var(--white); overflow-x:hidden; }

  /* Previous section */
  #before {
    height:100vh; background:#1a1815;
    display:flex; align-items:center; justify-content:center;
  }
  #before p { color:rgba(255,255,255,0.15); font-style:italic; font-family:Georgia,serif; }

  /* ══ WRAPPER — defines scroll space ══ */
  #curtain-wrap {
    position:relative;
    /* height = great room height + extra scroll to fully reveal kitchen */
    height:250vh;
  }

  /* ── KITCHEN — sticky, stays in place while great room scrolls over it ── */
  #kitchen-sticky {
    position:sticky;
    top:0;
    height:100vh;
    overflow:hidden;
    z-index:1;
  }
  #kitchen-sticky img {
    width:100%; height:100%; object-fit:cover;
    display:block;
  }
  #kitchen-sticky .titles {
    position:absolute; top:40px; left:28px; z-index:2;
  }

  /* ── GREAT ROOM — sits on top of kitchen, scrolls away naturally ── */
  #greatroom-panel {
    position:absolute;
    top:0; left:0; right:0;
    /* height = 100vh image + subtitle block */
    z-index:2;
    background:var(--ink);
  }
  #greatroom-img {
    position:relative;
    height:100vh;
    overflow:hidden;
  }
  #greatroom-img img {
    width:100%; height:100%; object-fit:cover; display:block;
  }
  #greatroom-img .titles {
    position:absolute; top:40px; left:28px; z-index:2;
  }

  /* Subtitles block — part of greatroom panel, scrolls with it */
  #subtitles {
    background:var(--ink);
    padding:52px 28px 80px;
  }
  .sub-rule {
    width:32px; height:1px;
    background:rgba(196,160,82,0.35);
    margin-bottom:20px;
  }
  .sub-text {
    font-family:'Jost',sans-serif;
    font-size:0.8rem; font-weight:300;
    line-height:1.95;
    color:rgba(255,255,255,0.5);
  }

  /* ── SHARED TITLE STYLES ── */
  .scene-num {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(3.5rem,16vw,7rem);
    font-weight:300; opacity:0.85;
    line-height:1; display:block;
    color:var(--white);
  }
  .scene-name {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(2rem,9vw,4rem);
    font-weight:300; line-height:1.05;
    color:var(--white);
  }

  /* After */
  #after {
    height:60vh; background:var(--ink);
    display:flex; align-items:center; justify-content:center;
    position:relative; z-index:3;
  }
  #after p { color:rgba(255,255,255,0.2); font-style:italic; font-family:'Cormorant Garamond',serif; }
</style>
</head>
<body>

<section id="before"><p>Previous section</p></section>

<div id="curtain-wrap">

  <!-- Kitchen — sticky underneath, revealed as great room scrolls away -->
  <div id="kitchen-sticky">
    <img src="https://raw.githubusercontent.com/hernanpagani-79/6ardingterrace/main/6-Harding_INTCAM06-1.jpg" alt="Kitchen">
    <div class="titles">
      <span class="scene-num">05</span>
      <h2 class="scene-name">Kitchen</h2>
    </div>
  </div>

  <!-- Great Room — on top, scrolls away revealing kitchen -->
  <div id="greatroom-panel">
    <div id="greatroom-img">
      <img src="https://raw.githubusercontent.com/hernanpagani-79/6ardingterrace/main/6-Harding_INTCAM05-2.jpg" alt="Great Room">
      <div class="titles">
        <span class="scene-num">04</span>
        <h2 class="scene-name">Great Room</h2>
      </div>
    </div>

    <!-- Subtitles scroll with great room -->
    <div id="subtitles">
      <div class="sub-rule"></div>
      <p class="sub-text">The room that earns the house. Vaulted white oak overhead, glass that folds entirely open to the garden, a fireplace that makes October worth having. Large enough to hold a crowd. Warm enough for just two.</p>
    </div>
  </div>

</div>

<section id="after"><p>Next section</p></section>

</body>
</html>
