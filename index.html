<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Reveal v5</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#0f0e0c; --gold:#c4a052; --white:#faf7f2; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--ink); color:var(--white); overflow-x:hidden; }

  /* ── GREAT ROOM — full screen image, title top-left ── */
  #great-room {
    position:relative;
    height:100vh;
    overflow:hidden;
  }
  #great-room img {
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
  }
  #great-room .titles {
    position:absolute; top:40px; left:28px;
    z-index:2;
  }

  /* ── SUBTITLES BLOCK — between the two images ── */
  #subtitles {
    background:var(--ink);
    padding:48px 28px;
    position:relative;
    z-index:1;
  }
  .sub-rule {
    width:32px; height:1px;
    background:rgba(196,160,82,0.4);
    margin-bottom:20px;
  }
  .sub-text {
    font-family:'Jost',sans-serif;
    font-size:0.8rem; font-weight:300;
    line-height:1.95;
    color:rgba(255,255,255,0.5);
  }

  /* ── KITCHEN — full screen image, title top-left ── */
  #kitchen {
    position:relative;
    height:100vh;
    overflow:hidden;
  }
  #kitchen img {
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
  }
  #kitchen .titles {
    position:absolute; top:40px; left:28px;
    z-index:2;
  }

  /* ── SHARED TITLE STYLES ── */
  .scene-num {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(3.5rem,16vw,7rem);
    font-weight:300;
    opacity:0.85;
    line-height:1;
    display:block;
    color:var(--white);
  }
  .scene-name {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(2rem,9vw,4rem);
    font-weight:300;
    line-height:1.05;
    color:var(--white);
  }

  /* After section */
  #after {
    height:50vh; background:var(--ink);
    display:flex; align-items:center; justify-content:center;
  }
  #after p { color:rgba(255,255,255,0.2); font-style:italic; font-family:'Cormorant Garamond',serif; }
</style>
</head>
<body>

<!-- Previous section placeholder -->
<div style="height:40vh;background:#1a1815;display:flex;align-items:center;justify-content:center">
  <p style="color:rgba(255,255,255,0.15);font-style:italic;font-family:Georgia,serif">Previous section</p>
</div>

<!-- Great Room -->
<section id="great-room">
  <img src="https://raw.githubusercontent.com/hernanpagani-79/6ardingterrace/main/6-Harding_INTCAM05-2.jpg" alt="Great Room">
  <div class="titles">
    <span class="scene-num">04</span>
    <h2 class="scene-name">Great Room</h2>
  </div>
</section>

<!-- Subtitles between images -->
<div id="subtitles">
  <div class="sub-rule"></div>
  <p class="sub-text">The room that earns the house. Vaulted white oak overhead, glass that folds entirely open to the garden, a fireplace that makes October worth having. Large enough to hold a crowd. Warm enough for just two.</p>
</div>

<!-- Kitchen -->
<section id="kitchen">
  <img src="https://raw.githubusercontent.com/hernanpagani-79/6ardingterrace/main/6-Harding_INTCAM06-1.jpg" alt="Kitchen">
  <div class="titles">
    <span class="scene-num">05</span>
    <h2 class="scene-name">Kitchen</h2>
  </div>
</section>

<section id="after"><p>Next section</p></section>

</body>
</html>
