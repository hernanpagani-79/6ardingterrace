<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Reveal — Prototype</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f0e0c; color:#faf7f2; font-family:'Georgia',serif; overflow-x:hidden; }

  /* ── SECTION BEFORE (simulates Great Room) ── */
  #great-room {
    position: relative;
    height: 100vh;
    background: #1a1815;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }
  #great-room h2 {
    font-size: 2rem;
    font-style: italic;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
  }

  /* ── KITCHEN REVEAL ── */
  #kitchen-wrap {
    position: relative;
    height: 300vh; /* scroll space */
  }

  /* Kitchen image — sticky, full screen, always behind */
  #kitchen-bg {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    z-index: 1;
  }
  #kitchen-bg img {
    position: absolute;
    inset: -10% 0;
    width: 100%;
    height: 120%;
    object-fit: cover;
    transform: translateY(0);
    will-change: transform;
  }
  /* Dark overlay on kitchen bg */
  #kitchen-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(15,14,12,0.3) 0%, rgba(15,14,12,0.1) 50%, rgba(15,14,12,0.6) 100%);
    z-index: 1;
  }

  /* Content that scrolls over the sticky bg */
  #kitchen-content {
    position: relative;
    z-index: 3;
    margin-top: -100vh;
    padding-top: 100vh; /* push content below the fold initially */
  }

  /* Second image — appears from below */
  #kitchen-second {
    padding: 0 24px 80px;
    opacity: 0;
    transform: translateY(60px);
    transition: opacity 1s ease, transform 1.2s cubic-bezier(0.16,1,0.3,1);
  }
  #kitchen-second.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #kitchen-second img {
    width: 72%;
    margin-left: auto;
    display: block;
    box-shadow: 0 40px 100px rgba(0,0,0,0.8);
  }

  /* Text block */
  #kitchen-text {
    background: linear-gradient(to bottom, transparent, #0f0e0c 25%);
    padding: 60px 32px 80px;
    position: relative;
    z-index: 3;
  }
  #kitchen-text .eyebrow {
    font-family: sans-serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(196,160,82,0.7);
    display: block;
    margin-bottom: 16px;
  }
  #kitchen-text h2 {
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  #kitchen-text h2 em {
    font-style: italic;
    color: rgba(255,255,255,0.5);
  }
  #kitchen-text p {
    font-family: sans-serif;
    font-size: 0.8rem;
    font-weight: 300;
    line-height: 1.9;
    color: rgba(255,255,255,0.5);
    max-width: 320px;
  }

  /* ── SECTION AFTER ── */
  #after {
    height: 100vh;
    background: #0f0e0c;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
  }
  #after p {
    color: rgba(255,255,255,0.2);
    font-style: italic;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<!-- Simulates Great Room -->
<section id="great-room">
  <h2>Great Room</h2>
</section>

<!-- Kitchen Reveal -->
<div id="kitchen-wrap">

  <!-- Full screen kitchen image — sticky -->
  <div id="kitchen-bg">
    <img src="https://raw.githubusercontent.com/hernanpagani-79/6ardingterrace/main/6-Harding_INTCAM06-1.jpg" alt="Kitchen">
  </div>

  <!-- Content scrolls over the sticky bg -->
  <div id="kitchen-content">

    <!-- Second image — floats in from below -->
    <div id="kitchen-second">
      <img src="https://raw.githubusercontent.com/hernanpagani-79/6ardingterrace/main/6-Harding_INTCAM09-2.jpg" alt="Kitchen Detail">
    </div>

    <!-- Text -->
    <div id="kitchen-text">
      <span class="eyebrow">— Kitchen</span>
      <h2>Chef's<br><em>Kitchen</em></h2>
      <p>White oak cabinetry, honed stone island, brass pendants. A six-burner range for the cook who means it.</p>
    </div>

  </div>

</div>

<!-- Section after -->
<section id="after">
  <p>Next section</p>
</section>

<script>
// Parallax on kitchen bg image
const kitchenBgImg = document.querySelector('#kitchen-bg img');
const kitchenWrap  = document.getElementById('kitchen-wrap');
const kitchenSecond = document.getElementById('kitchen-second');

let ticking = false;
let secondTriggered = false;

function tick(){
  const wh = window.innerHeight;
  const wr = kitchenWrap.getBoundingClientRect();

  // Parallax on bg image — moves slower than scroll
  if(wr.bottom > 0 && wr.top < wh * 2){
    const progress = Math.max(0, Math.min(1, -wr.top / (kitchenWrap.offsetHeight - wh)));
    kitchenBgImg.style.transform = `translateY(${progress * 12}%)`;
  }

  // Trigger second image when bg has been visible for a bit (scroll ~40% into wrap)
  if(!secondTriggered){
    const scrollIntoWrap = -wr.top;
    if(scrollIntoWrap > wh * 0.5){
      secondTriggered = true;
      kitchenSecond.classList.add('visible');
    }
  }

  ticking = false;
}

window.addEventListener('scroll', () => {
  if(!ticking){ requestAnimationFrame(tick); ticking = true; }
}, {passive: true});

tick();
</script>
</body>
</html>
